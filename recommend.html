<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Stock Podium MVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
  <div id="intro-container">
    <div class="fade"></div>
    <section class="star-wars">
      <div class="crawl" id="intro-crawl">
      </div>
    </section>
    <button id="skip-button">SKIP INTRO</button>
  </div>

  <div id="ui-container" style="display: none;">
    <h1>Stocks recommended by Chart Dr. AI</h1>
    <!--<p>AI predicted Top 10 trending stocks</p>-->
    <div class="filter-container">
      <button id="btn-weekly" class="filter-btn active">금주 추천 (금요일)</button>
      <button id="btn-today" class="filter-btn">실시간 (오늘)</button>
    </div>
  </div>

  <div id="sidebar-container" style="display: none;">
    <h2>Top 10 Rankings</h2>
    <div id="sidebar-list">
    </div>
  </div>

  <div id="tooltip" class="hidden">
    <div id="tooltip-logo"></div>
    <div class="tooltip-info">
      <h3 id="tooltip-name">Stock Name</h3>
      <p id="tooltip-price">$0</p>
      <p id="tooltip-change" class="positive">+0.00%</p>
    </div>
  </div>

  <canvas id="app-canvas"></canvas>

  <!-- Reason Modal -->
  <div id="reason-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button id="modal-close" class="modal-close-btn">&times;</button>
      <div class="modal-header">
        <div class="modal-title-group">
          <h2 id="modal-stock-name">Stock Name</h2>
          <span id="modal-stock-symbol" class="modal-symbol">SYMBOL</span>
        </div>
        <div class="modal-price-group">
          <span id="modal-stock-price">Price</span>
          <span id="modal-stock-change" class="positive">Change</span>
        </div>
      </div>
      <div class="modal-body">
        <h3>AI 추천 분석 요약</h3>
        <div class="reason-box">
          <p id="modal-reason-text">분석 데이터를 불러오는 중입니다...</p>
        </div>
        <div class="modal-tags" id="modal-tags-container">
          <!-- Tags will be dynamically inserted here -->
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
