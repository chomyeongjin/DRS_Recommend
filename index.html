<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRS - AI Stock Recommendations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Outfit:wght@400;600;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-light: #090a0f;
      --text-dark: #1e293b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-light);
      color: var(--text-dark);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .drs-title {
      font-family: 'Michroma', sans-serif;
      font-size: 5vw;
      line-height: 1;
      margin: 0;
      color: #ffffff;
      /*text-align: center;*/
      text-transform: uppercase;
      z-index: 1;
      letter-spacing: -0.05em;
      top: 40px;
      position: absolute;
    }

    .overlay {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform: translate(-50%, 50%);
      z-index: 10;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: max-content;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    p {
      font-size: 1.2rem;
      color: #ffffff;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .button-group {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      cursor: pointer;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-3px);
      box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.4);
    }

    .btn-outline {
      background-color: transparent;
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    .btn-outline:hover {
      background-color: rgba(255, 255, 255, 0.1);
      border-color: white;
      transform: translateY(-3px);
      box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>
  <h1 class="drs-title">DRS</h1>

  <div class="overlay">
    <p>원하는 서비스를 선택해주세요.</p>
    <div class="button-group">
      <a href="search.html" class="btn btn-outline" id="searchBtn">차트 검색</a>
      <a href="recommend.html" class="btn btn-primary">종목 추천</a>
    </div>
  </div>
</body>

</html>
